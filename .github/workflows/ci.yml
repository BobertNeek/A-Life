name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
    branches: ["main"]

jobs:
  rust:
    name: Rust workspace validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Benchmark smoke
        run: cargo test -p alife_tools --test benchmark_tiers benchmark_tiers_smoke_runs_tier_1_and_10_quickly

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Core boundaries
        run: bash scripts/check_core_boundaries.sh

      - name: Docs checks
        run: bash scripts/docs_check.sh
